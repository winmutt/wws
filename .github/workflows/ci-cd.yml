name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  protobuf:
    runs-on: ubuntu-latest
    name: Build Protobuf
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install protobuf compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Install protoc-gen-go
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
    
    - name: Install protoc-gen-go-grpc
      run: |
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install protoc-gen-grpc-web
      run: |
        npm install -g protoc-gen-grpc-web
    
    - name: Generate protobuf code
      run: |
        cd api
        make proto-go
    
    - name: Verify generated Go files
      run: |
        ls -la api/proto/*/*.pb.go
    
    - name: Upload generated files
      uses: actions/upload-artifact@v4
      with:
        name: generated-proto
        path: api/proto

  test:
    needs: [protobuf]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download generated protobuf
      uses: actions/download-artifact@v4
      with:
        name: generated-proto
        path: api/proto
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: |
        cd web && npm install --legacy-peer-deps
  
    - name: Build React frontend
      run: |
        cd web && npm run build
    
    - name: Run Go tests
      run: |
        cd api && go test ./... -v -coverprofile=../coverage.out
    
    - name: Run Go vet
      run: |
        cd api && go vet ./...
    
    - name: Run Go fmt check
      run: |
        if [ -n "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))" ]; then
          echo "Code not formatted"
          exit 1
        fi
    
    - name: Build Go backend
      run: |
        cd api && go build -v -o ../wws ./cmd
    
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage.out

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment"
