name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  protobuf:
    runs-on: ubuntu-latest
    name: Build Protobuf
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install protobuf compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Install protoc-gen-go
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
    
    - name: Install protoc-gen-go-grpc
      run: |
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install protoc-gen-grpc-web
      run: |
        npm install -g protoc-gen-grpc-web
    
    - name: Generate protobuf code
      run: |
        cd api
        make proto-go
    
    - name: Verify generated Go files
      run: |
        ls -la api/proto/*/*.pb.go
    
    - name: Upload generated files
      uses: actions/upload-artifact@v4
      with:
        name: generated-proto
        path: api/proto

  lint:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.54.2
    
    - name: Run Go linter
      run: |
        cd api && golangci-lint run
    
    - name: Run Go fmt check
      run: |
        if [ -n "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*' -not -path './proto/*'))" ]; then
          echo "Code not formatted:"
          gofmt -l $(find . -name '*.go' -not -path './vendor/*' -not -path './proto/*')
          exit 1
        fi
    
    - name: Run Go vet
      run: |
        cd api && go vet ./...
    
    - name: Install frontend dependencies
      run: |
        cd web && npm install --legacy-peer-deps
    
    - name: Run frontend lint
      run: |
        cd web && npm run lint || true
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}

  test:
    needs: [protobuf, lint]
    runs-on: ubuntu-latest
    name: Backend Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download generated protobuf
      uses: actions/download-artifact@v4
      with:
        name: generated-proto
        path: api/proto
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: |
        cd web && npm install --legacy-peer-deps
    
    - name: Run Go tests with coverage
      run: |
        cd api && go test ./... -v -coverprofile=../coverage.out -covermode=atomic
    
    - name: Generate coverage report
      run: |
        cd api && go test ./... -cover
        go tool cover -func=../coverage.out | tail -1
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: backend
        name: wws-backend
        fail_ci_if_error: false
    
    - name: Build React frontend
      run: |
        cd web && npm run build
    
    - name: Build Go backend
      run: |
        cd api && go build -v -o ../wws ./cmd
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wws-binaries
        path: |
          wws
          web/build

  integration-tests:
    needs: test
    runs-on: ubuntu-latest
    name: Integration Tests
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: wws
          POSTGRES_PASSWORD: wws_password
          POSTGRES_DB: wws_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: |
        cd web && npm install --legacy-peer-deps
    
    - name: Download generated protobuf
      uses: actions/download-artifact@v4
      if: needs.protobuf.result == 'success'
      with:
        name: generated-proto
        path: api/proto
    
    - name: Run database integration tests
      run: |
        cd api
        go test -v ./internal/db/... -run TestWorkspaceTableHasRegionColumn
    
    - name: Run provider integration tests
      run: |
        cd api
        go test -v ./provisioner/podman/... ./provisioner/kvm/... -timeout 30s
    
    - name: Run workspace lifecycle integration tests
      run: |
        chmod +x tests/workspace_lifecycle_test.sh
        tests/workspace_lifecycle_test.sh || echo "Integration tests require running environment"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          coverage.out
          *.xml

  e2e-tests:
    needs: test
    runs-on: ubuntu-latest
    name: E2E Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Download generated protobuf
      uses: actions/download-artifact@v4
      if: needs.protobuf.result == 'success'
      with:
        name: generated-proto
        path: api/proto
    
    - name: Run E2E test scripts (validation)
      run: |
        chmod +x tests/e2e/*.sh
        echo "Running E2E test validation..."
        # Run test scripts that don't require live API
        bash tests/e2e/run_phase25_tests.sh --validate-only || echo "E2E tests require running API server"
    
    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-results
        path: |
          tests/e2e/*.sh
          tests/e2e/*.log

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Run GoSec security scanner
      uses: securego/gosec@master
      with:
        args: ./...
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run npm audit
      run: |
        cd web && npm audit --audit-level=high || true
    
    - name: Run Go dependency audit
      run: |
        cd api && go mod verify
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: |
          trivy-results.sarif

  deploy:
    needs: [test, integration-tests, e2e-tests, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: wws-binaries
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment"
    
    - name: Notify deployment
      run: |
        echo "Deployment completed successfully"
