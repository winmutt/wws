syntax = "proto3";

package wws.organization;

option go_package = "wws/api/proto/organization";
option js_package = "wws.organization";

import "common/common.proto";
import "user/user.proto";

// Organization service definition
service OrganizationService {
  // List all organizations
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  
  // Get organization by ID
  rpc GetOrganization(GetOrganizationRequest) returns (OrganizationResponse);
  
  // Create organization
  rpc CreateOrganization(CreateOrganizationRequest) returns (OrganizationResponse);
  
  // Update organization
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (OrganizationResponse);
  
  // Delete organization
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (common.Empty);
  
  // Invite user to organization
  rpc InviteUser(InviteUserRequest) returns (InviteUserResponse);
  
  // Accept invitation
  rpc AcceptInvitation(AcceptInvitationRequest) returns (common.Empty);
  
  // List organization members
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  
  // Update member role
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (MemberResponse);
  
  // Remove member from organization
  rpc RemoveMember(RemoveMemberRequest) returns (common.Empty);
}

// Organization message
message Organization {
  int32 id = 1;
  string name = 2;
  int32 owner_id = 3;
  string description = 4;
  string avatar_url = 5;
  common.Timestamp created_at = 6;
  common.Timestamp updated_at = 7;
}

// Member message
message Member {
  int32 id = 1;
  user.User user = 2;
  string role = 3;  // admin, member, viewer
  bool accepted = 4;
  common.Timestamp invited_at = 5;
  common.Timestamp joined_at = 6;
}

// Invitation message
message Invitation {
  int32 id = 1;
  int32 organization_id = 2;
  string email = 3;
  string role = 4;
  int32 invited_by = 5;
  bool accepted = 6;
  common.Timestamp expires_at = 7;
  common.Timestamp created_at = 8;
}

// ListOrganizationsRequest
message ListOrganizationsRequest {
  common.PaginationRequest pagination = 1;
}

// ListOrganizationsResponse
message ListOrganizationsResponse {
  repeated Organization organizations = 1;
  common.PaginationResponse pagination = 2;
}

// GetOrganizationRequest
message GetOrganizationRequest {
  int32 id = 1;
}

// OrganizationResponse
message OrganizationResponse {
  Organization organization = 1;
}

// CreateOrganizationRequest
message CreateOrganizationRequest {
  string name = 1;
  string description = 2;
}

// UpdateOrganizationRequest
message UpdateOrganizationRequest {
  int32 id = 1;
  string name = 2;
  string description = 3;
}

// DeleteOrganizationRequest
message DeleteOrganizationRequest {
  int32 id = 1;
}

// InviteUserRequest
message InviteUserRequest {
  int32 organization_id = 1;
  string email = 2;
  string role = 3;
}

// InviteUserResponse
message InviteUserResponse {
  Invitation invitation = 1;
}

// AcceptInvitationRequest
message AcceptInvitationRequest {
  int32 invitation_id = 1;
}

// ListMembersRequest
message ListMembersRequest {
  int32 organization_id = 1;
  common.PaginationRequest pagination = 2;
}

// ListMembersResponse
message ListMembersResponse {
  repeated Member members = 1;
  common.PaginationResponse pagination = 2;
}

// MemberResponse
message MemberResponse {
  Member member = 1;
}

// UpdateMemberRoleRequest
message UpdateMemberRoleRequest {
  int32 organization_id = 1;
  int32 user_id = 2;
  string role = 3;
}

// RemoveMemberRequest
message RemoveMemberRequest {
  int32 organization_id = 1;
  int32 user_id = 2;
}
