version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "192.168.1.96:8080:8080"
    environment:
      - PORT=8080
      - HOST=192.168.1.96
      - DATABASE_URL=/data/wws.db
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-http://192.168.1.96:8080/oauth/callback}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://192.168.1.96:3000,http://localhost:3000,http://127.0.0.1:3000}
      - WORKSPACE_IDLE_TIMEOUT_HOURS=${WORKSPACE_IDLE_TIMEOUT_HOURS:-6}
      - WORKSPACE_DEFAULT_STORAGE_GB=${WORKSPACE_DEFAULT_STORAGE_GB:-20}
      - WORKSPACE_DEFAULT_CPU=${WORKSPACE_DEFAULT_CPU:-2}
      - WORKSPACE_DEFAULT_MEMORY_GB=${WORKSPACE_DEFAULT_MEMORY_GB:-4}
    volumes:
      - ./data:/data
    depends_on:
      database:
        condition: service_healthy
    networks:
      - wws-network
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "192.168.1.96:3000:80"
    environment:
      - API_URL=${API_URL:-http://192.168.1.96:8080}
    depends_on:
      - api
    networks:
      - wws-network
    restart: unless-stopped

  database:
    image: alpine:latest
    command: >
      sh -c "mkdir -p /data && touch /data/wws.db && echo 'WWS SQLite database initialized' && sleep infinity"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "test", "-f", "/data/wws.db"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wws-network

networks:
  wws-network:
    driver: bridge

volumes:
  data:
